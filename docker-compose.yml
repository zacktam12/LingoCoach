version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lingocoach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lingocoach
      POSTGRES_PASSWORD: lingocoach_dev
      POSTGRES_DB: lingocoach
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lingocoach']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lingocoach-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./LingoCoach-Backend
      dockerfile: Dockerfile
    container_name: lingocoach-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://lingocoach:lingocoach_dev@postgres:5432/lingocoach
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./LingoCoach-Frontend
      dockerfile: Dockerfile
    container_name: lingocoach-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
